name: "Deploy Davr Group Backend"

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/itsoft-dev/davr-group-backend
  DEPLOY_PATH: /home/deploy/apps/davr-group-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup SSH"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: "Add server to known hosts"
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: "Upload docker-compose.yml"
        run: |
          ssh -p 2222 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp -P 2222 docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: "Deploy"
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          envs: GH_PAT
          command_timeout: 30m
          script: |
            docker network inspect dg_network >/dev/null 2>&1 || docker network create dg_network
            cd /home/deploy/apps/davr-group-backend
            echo $GH_PAT | docker login ghcr.io -u ItSoft-dev --password-stdin
            docker compose pull backend
            docker compose up -d --force-recreate backend
            docker images ghcr.io/itsoft-dev/davr-group-backend --filter "dangling=true" -q | xargs -r docker rmi || true
            echo "Davr Group Backend Deployed!"
            docker compose ps
